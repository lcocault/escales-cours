<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Escales Culinaires – Cours de Cuisine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Georgia', serif; background: #faf9f6; color: #333; }
    header { background: #8b4513; color: #fff; padding: 2rem; text-align: center; }
    header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    header p { font-size: 1.1rem; opacity: 0.9; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h2 { font-size: 1.8rem; margin-bottom: 1.5rem; text-align: center; color: #8b4513; }
    .courses { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .card h3 { font-size: 1.2rem; color: #5a3010; }
    .card .price { font-size: 1.4rem; font-weight: bold; color: #8b4513; }
    .card a {
      display: inline-block;
      margin-top: auto;
      padding: 0.7rem 1.2rem;
      background: #8b4513;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      text-align: center;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .card a:hover { background: #6a3210; }
    footer { text-align: center; padding: 2rem; color: #888; font-size: 0.85rem; margin-top: 3rem; }
  </style>
</head>
<body>
  <header>
    <h1>Les Escales Culinaires</h1>
    <p>Découvrez nos cours de cuisine avec nos chefs passionnés</p>
  </header>
  <main>
    <h2>Nos Cours</h2>
    <div class="courses" id="courses-container">
      <p>Chargement des cours...</p>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Les Escales Culinaires. Tous droits réservés.</p>
  </footer>
  <script>
    fetch('/api/courses')
      .then(r => r.json())
      .then(({ courses }) => {
        const container = document.getElementById('courses-container');
        container.innerHTML = courses.map(c => `
          <div class="card">
            <h3>${c.name}</h3>
            <div class="price">${(c.amountCents / 100).toFixed(2)} €</div>
            <a href="/api/checkout/${c.id}">Réserver &amp; Payer</a>
          </div>
        `).join('');
      })
      .catch(() => {
        document.getElementById('courses-container').innerHTML =
          '<p>Impossible de charger les cours. Veuillez réessayer.</p>';
      });
  </script>
</body>
</html>
